<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyMetriSense Puter Bridge Engine</title>
    <script src="https://js.puter.com/v2/"></script>
</head>
<body>
    <script>
        console.log("Puter GitHub Bridge Engine Active.");

        window.addEventListener("message", async function(event) {
            const { modelId, prompt } = event.data;
            if (!modelId || !prompt) return;

            try {
                // Berjalan di lingkungan HTTPS murni milik GitHub Pages
                const response = await puter.ai.chat(prompt, { model: modelId });
                window.parent.postMessage({ status: "success", content: response.message.content }, "*");
            } catch (error) {
                const msgError = error.message || JSON.stringify(error);
                window.parent.postMessage({ status: "error", content: msgError }, "*");
            }
        });
    </script>
</body>
</html>
